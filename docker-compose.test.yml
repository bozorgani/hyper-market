name: hyper-market-test

# Stable E2E infrastructure for local development and CI.
# Tests run on the host; dependencies run in Docker.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --wait
#   npm run test:e2e --workspace=apps/backend-api -- --runInBand
#   docker compose -f docker-compose.test.yml down -v

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    tmpfs:
      - /data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'try { rs.status().ok } catch (e) { rs.initiate({_id: \"rs0\", members: [{ _id: 0, host: \"localhost:27017\" }] }).ok }' | grep -q 1"
        ]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 60

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: hyper_market_meili_master_key_change_me
    ports:
      - "7700:7700"
    tmpfs:
      - /meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 60
