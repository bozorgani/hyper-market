name: hyper-market-test

# Stable E2E infrastructure for local development and CI.
# Tests run on the host; dependencies run in Docker.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --wait
#   npm run test:e2e --workspace=apps/backend-api -- --runInBand
#   docker compose -f docker-compose.test.yml down -v
#
# The host ports intentionally default to non-standard values so the test
# infrastructure can run next to the normal local stack:
#   MongoDB:     localhost:${MONGO_TEST_PORT:-27018}
#   Redis:       localhost:${REDIS_TEST_PORT:-6380}
#   Meilisearch: localhost:${MEILI_TEST_PORT:-7701}

services:
  mongo:
    image: ${MONGO_IMAGE:-mongo:7}
    restart: unless-stopped
    # E2E tests enable MONGODB_TRANSACTION_FALLBACK_ENABLED, so a standalone
    # MongoDB instance is enough and avoids replica-set host/port issues when
    # the host port differs from the container port.
    command: ["mongod", "--bind_ip_all"]
    ports:
      - "127.0.0.1:${MONGO_TEST_PORT:-27018}:27017"
    tmpfs:
      - /data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep -q 1"]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 5s

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:${REDIS_TEST_PORT:-6380}:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 60

  meilisearch:
    image: ${MEILI_IMAGE:-getmeili/meilisearch:v1.12}
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: hyper_market_meili_master_key_change_me
    ports:
      - "127.0.0.1:${MEILI_TEST_PORT:-7701}:7700"
    tmpfs:
      - /meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 60
