name: hyper-market-production

# Production Docker Compose with Resource Limits
# Use this file for production deployments:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  mongo:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  redis:
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 128M

  meilisearch:
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  backend:
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    environment:
      APP_ENV: production
      NODE_ENV: production
      WORKERS_ENABLED: "false"
      SWAGGER_ENABLED: "false"

  worker:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      APP_ENV: production
      NODE_ENV: production
      WORKERS_ENABLED: "true"
      SKIP_MIGRATIONS: "true"

  web:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
