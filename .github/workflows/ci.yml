name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Do not use gitleaks/gitleaks-action here. Recent versions of that
      # marketplace action require a commercial GITLEAKS_LICENSE secret and its
      # older Node runtime can trip GitHub Actions deprecation warnings. The OSS
      # gitleaks CLI does not require a license, so install and run it directly.
      - name: Install Gitleaks CLI
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name)"
          if [[ -z "${VERSION}" || "${VERSION}" == "null" ]]; then
            echo "Could not resolve latest gitleaks version" >&2
            exit 1
          fi
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Verify Gitleaks
        run: gitleaks version

      - name: Run Gitleaks scan
        shell: bash
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --verbose \
            --redact \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Upload Gitleaks report artifact
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit — high and critical vulnerabilities
        run: npm audit --audit-level=high

  backend:
    name: Backend build and unit tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Backend build
        run: npm run backend:build

      - name: Backend unit tests
        run: npm run backend:test -- --runInBand

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint --workspace=apps/web

      - name: Frontend build
        run: npm run build --workspace=apps/web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api/v1
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

  frontend-e2e:
    name: Frontend E2E tests
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Frontend E2E tests
        run: npm run web:e2e
        env:
          NEXT_PUBLIC_API_BASE_URL: /api/v1
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3100
          NEXT_TELEMETRY_DISABLED: "1"

  e2e:
    name: Backend E2E tests
    runs-on: ubuntu-latest
    needs: [backend]

    env:
      APP_ENV: test
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: mongodb://localhost:27018/hypermarket_test
      REDIS_URL: redis://localhost:6380
      REDIS_HOST: localhost
      REDIS_PORT: 6380
      MEILI_HOST: http://localhost:7701
      MEILI_API_KEY: hyper_market_meili_master_key_change_me
      JWT_ACCESS_SECRET: test-access-secret-e2e-min-32chars!!
      JWT_REFRESH_SECRET: test-refresh-secret-e2e-min-32chars!
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 30d
      JWT_ISSUER: hyper-market
      JWT_AUDIENCE: hyper-market-api
      PASSWORD_PEPPER: test-password-pepper-e2e-min-32chars!
      OTP_HASH_SECRET: test-otp-hash-secret-e2e-min-32chars!
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      AUTH_COOKIE_SAME_SITE: lax
      AUTH_RETURN_TOKENS_IN_BODY: "false"
      AUTH_LOG_OTP_CODES: "false"
      CSRF_PROTECTION_ENABLED: "false"
      WORKERS_ENABLED: "false"
      OUTBOX_RELAY_ENABLED: "false"
      SEARCH_INDEXING_WORKER_ENABLED: "false"
      SKIP_MIGRATIONS: "true"
      SWAGGER_ENABLED: "false"
      MONGODB_TRANSACTION_FALLBACK_ENABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start E2E infrastructure
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Backend E2E tests
        run: npm run test:e2e --workspace=apps/backend-api -- --runInBand

      - name: Dump E2E infrastructure logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs --no-color

      - name: Stop E2E infrastructure
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans
