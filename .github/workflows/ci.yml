name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit — high and critical vulnerabilities
        run: npm audit --audit-level=high

  backend:
    name: Backend build and unit tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Backend build
        run: npm run backend:build

      - name: Backend unit tests
        run: npm run backend:test -- --runInBand

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint --workspace=apps/web

      - name: Frontend build
        run: npm run build --workspace=apps/web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api/v1
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

  e2e:
    name: Backend E2E tests
    runs-on: ubuntu-latest
    needs: [backend]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30

      meilisearch:
        image: getmeili/meilisearch:v1.12
        ports:
          - 7700:7700
        env:
          MEILI_ENV: development
          MEILI_NO_ANALYTICS: "true"
          MEILI_MASTER_KEY: hyper_market_meili_master_key_change_me

    env:
      APP_ENV: test
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: mongodb://localhost:27017/hypermarket_test?replicaSet=rs0
      REDIS_URL: redis://localhost:6379
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      MEILI_HOST: http://localhost:7700
      MEILI_API_KEY: hyper_market_meili_master_key_change_me
      JWT_ACCESS_SECRET: test-access-secret-e2e-min-32chars!!
      JWT_REFRESH_SECRET: test-refresh-secret-e2e-min-32chars!
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 30d
      JWT_ISSUER: hyper-market
      JWT_AUDIENCE: hyper-market-api
      PASSWORD_PEPPER: test-password-pepper-e2e-min-32chars!
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      AUTH_COOKIE_SAME_SITE: lax
      AUTH_RETURN_TOKENS_IN_BODY: "false"
      AUTH_LOG_OTP_CODES: "false"
      CSRF_PROTECTION_ENABLED: "true"
      WORKERS_ENABLED: "false"
      OUTBOX_RELAY_ENABLED: "false"
      SEARCH_INDEXING_WORKER_ENABLED: "false"
      SKIP_MIGRATIONS: "false"
      SWAGGER_ENABLED: "false"
      MONGODB_TRANSACTION_FALLBACK_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start MongoDB replica set
        run: |
          docker run -d \
            --name hyper-market-ci-mongo \
            -p 27017:27017 \
            mongo:7 \
            mongod --replSet rs0 --bind_ip_all

          for i in {1..60}; do
            if docker exec hyper-market-ci-mongo mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep -q 1; then
              break
            fi
            echo "Waiting for MongoDB process... ($i/60)"
            sleep 2
          done

          docker exec hyper-market-ci-mongo mongosh --quiet --eval '
            rs.initiate({
              _id: "rs0",
              members: [{ _id: 0, host: "localhost:27017" }]
            })
          ' || true

          for i in {1..60}; do
            if docker exec hyper-market-ci-mongo mongosh --quiet --eval 'rs.status().ok' | grep -q 1; then
              echo "MongoDB replica set is ready"
              exit 0
            fi
            echo "Waiting for MongoDB replica set... ($i/60)"
            sleep 2
          done

          echo "MongoDB replica set did not become ready in time"
          docker logs hyper-market-ci-mongo
          exit 1

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            if docker run --rm --network host redis:7-alpine redis-cli -h 127.0.0.1 ping | grep -q PONG; then
              echo "Redis is ready"
              exit 0
            fi
            echo "Waiting for Redis... ($i/30)"
            sleep 2
          done
          exit 1

      - name: Wait for Meilisearch
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:7700/health >/dev/null; then
              echo "Meilisearch is ready"
              exit 0
            fi
            echo "Waiting for Meilisearch... ($i/60)"
            sleep 2
          done
          exit 1

      - name: Backend E2E tests
        run: npm run test:e2e --workspace=apps/backend-api -- --runInBand
