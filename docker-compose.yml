name: hyper-market

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-development}
  NODE_ENV: production
  PORT: 3001
  DATABASE_URL: mongodb://mongo:27017/hyper_market?replicaSet=rs0
  REDIS_URL: redis://redis:6379
  REDIS_HOST: redis
  REDIS_PORT: 6379
  MEILI_HOST: http://meilisearch:7700
  MEILI_API_KEY: ${MEILI_MASTER_KEY:-hyper_market_meili_master_key_change_me}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-0ae89d34d324103cba8bbbf5be086812ac916a0ac4afd46c8cd242a96563dc58fe2ef9fe0e5ced7923dbfe9c096b14a07d8ef0486506ff1da6ee0e8ca708a914}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-428927f0f9cc222137b6d8de3b4c9803988ceeaaee05242d92a3968d8e86c4a01baaa0a0cac48359b82f01ce5f8d463c03f0cfb81cfec9974f35df12779ddee6}
  JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
  JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-30d}
  JWT_ISSUER: ${JWT_ISSUER:-hyper-market}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-hyper-market-api}
  PASSWORD_PEPPER: ${PASSWORD_PEPPER:-be0e18837932824ffa2e20572276690d962d8ae5562a4c5bdcd7ed4e47fdeaa1ba7c32d84e2acc4dd39216888382679732cbd476a54c9264b7bd02cf7441d236}
  OTP_HASH_SECRET: ${OTP_HASH_SECRET:-45b64e2000114a0f1ade2f3c192f12e188f8d5d5770678714cef9c5496ab298596da9303e4b8c44d0fad6a8f7eb06c332a3f1143eb245d207b640ced03079e48}
  AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-lax}
  AUTH_RETURN_TOKENS_IN_BODY: ${AUTH_RETURN_TOKENS_IN_BODY:-false}
  AUTH_LOG_OTP_CODES: ${AUTH_LOG_OTP_CODES:-false}
  CSRF_PROTECTION_ENABLED: ${CSRF_PROTECTION_ENABLED:-true}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
  PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:3001}
  SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
  STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
  PRODUCT_IMAGE_UPLOAD_DIR: /app/uploads/product-images
  PRODUCT_IMAGE_MAX_BYTES: ${PRODUCT_IMAGE_MAX_BYTES:-5242880}
  ANALYTICS_MAX_METADATA_BYTES: ${ANALYTICS_MAX_METADATA_BYTES:-4096}
  ERROR_TRACKING_WEBHOOK_URL: ${ERROR_TRACKING_WEBHOOK_URL:-}
  COUPON_CODES_JSON: ${COUPON_CODES_JSON:-[]}
  IDEMPOTENCY_KEY_TTL_SECONDS: ${IDEMPOTENCY_KEY_TTL_SECONDS:-86400}
  MONGODB_TRANSACTION_FALLBACK_ENABLED: ${MONGODB_TRANSACTION_FALLBACK_ENABLED:-false}
  OUTBOX_RELAY_ENABLED: ${OUTBOX_RELAY_ENABLED:-true}
  SEARCH_INDEXING_WORKER_ENABLED: ${SEARCH_INDEXING_WORKER_ENABLED:-true}
  OUTBOX_SWEEP_INTERVAL_MS: ${OUTBOX_SWEEP_INTERVAL_MS:-5000}
  OUTBOX_PENDING_GRACE_MS: ${OUTBOX_PENDING_GRACE_MS:-15000}
  OUTBOX_RELAY_MAX_ATTEMPTS: ${OUTBOX_RELAY_MAX_ATTEMPTS:-5}
  RATE_LIMIT_DEFAULT_LIMIT: ${RATE_LIMIT_DEFAULT_LIMIT:-1000}
  RATE_LIMIT_DEFAULT_TTL_MS: ${RATE_LIMIT_DEFAULT_TTL_MS:-60000}
  RATE_LIMIT_AUTH_LIMIT: ${RATE_LIMIT_AUTH_LIMIT:-30}
  RATE_LIMIT_AUTH_TTL_MS: ${RATE_LIMIT_AUTH_TTL_MS:-60000}
  RATE_LIMIT_SENSITIVE_LIMIT: ${RATE_LIMIT_SENSITIVE_LIMIT:-100}
  RATE_LIMIT_SENSITIVE_TTL_MS: ${RATE_LIMIT_SENSITIVE_TTL_MS:-60000}
  SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME:-هایپرمارکت}
  SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
  SMS_IR_API_KEY: ${SMS_IR_API_KEY:-}
  SMS_IR_BASE_URL: ${SMS_IR_BASE_URL:-https://api.sms.ir/v1}
  SMS_IR_VERIFY_TEMPLATE_ID: ${SMS_IR_VERIFY_TEMPLATE_ID:-123456}
  SMS_IR_VERIFY_PARAMETER_NAME: ${SMS_IR_VERIFY_PARAMETER_NAME:-Code}

services:
  mongo:
    image: ${MONGO_IMAGE:-mongo:7}
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'try { rs.status().ok } catch (e) { rs.initiate({_id: \"rs0\", members: [{ _id: 0, host: \"mongo:27017\" }] }).ok }' | grep -q 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 10s

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  meilisearch:
    image: ${MEILI_IMAGE:-getmeili/meilisearch:v1.12}
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-c3baddd08bee590745bbccab4a57171f486299ab83c94d7fa52502d8cfbc1990}
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data

  backend:
    image: hyper-market-backend:local
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-bookworm-slim}
    restart: unless-stopped
    environment:
      <<: *backend-env
      WORKERS_ENABLED: "false"
      SKIP_MIGRATIONS: ${SKIP_MIGRATIONS:-false}
    ports:
      - "3001:3001"
    volumes:
      - backend-uploads:/app/uploads/product-images
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3001/health/live', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

  worker:
    image: hyper-market-backend:local
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-bookworm-slim}
    restart: unless-stopped
    command: ["node", "apps/backend-api/dist/src/worker.js"]
    environment:
      <<: *backend-env
      WORKERS_ENABLED: "true"
      SKIP_MIGRATIONS: "true"
    volumes:
      - backend-uploads:/app/uploads/product-images
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started

  web:
    image: hyper-market-web:local
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-bookworm-slim}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api/v1}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      # Internal URL used by Next.js Server Components / Server Actions from inside the web container.
      # Browser-side requests still use NEXT_PUBLIC_API_BASE_URL.
      SERVER_API_BASE_URL: ${SERVER_API_BASE_URL:-http://backend:3001/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  mongo-data:
  redis-data:
  meili-data:
  backend-uploads:


